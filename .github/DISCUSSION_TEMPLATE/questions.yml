# Discussion template for questions about HEAR-UI.

labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in HEAR-UI!
        Please describe your question as clearly as possible. Include code snippets or screenshots if relevant.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Describe your question...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Related Component
      description: Which part of the project does this relate to?
      multiple: true
      options:
        - Frontend (Vue.js)
        - Backend (FastAPI)
        - ML Model / SHAP Explanations
        - Docker / Deployment
        - General / Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional context, links, or screenshots.
