# Production Deployment Pipeline
# Builds Docker images and deploys to production when a tag is pushed.
#
# Trigger: Push a tag matching v*.*.* (e.g. v1.2.3)
# Steps:
#   1. Run backend + frontend CI checks
#   2. Build & push Docker images to GitHub Container Registry
#   3. Deploy (placeholder — adapt to your hosting provider)

name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ── Gate: run existing CI pipelines first ──────────────────────────
  ci-backend:
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit

  ci-frontend:
    uses: ./.github/workflows/frontend-ci.yml
    secrets: inherit

  # ── Build & push container images ─────────────────────────────────
  build-images:
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./backend
            image_env: BACKEND_IMAGE
          - context: ./frontend
            image_env: FRONTEND_IMAGE
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env[matrix.image_env] }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy (placeholder) ──────────────────────────────────────────
  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Deploying ${{ github.ref_name }} to ${{ github.event.inputs.environment || 'production' }}"
          echo "Backend image:  ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          echo "Frontend image: ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"

      # ─── Adapt this section to your hosting provider ───
      # Examples:
      #
      # SSH + docker compose:
      #   - name: Deploy via SSH
      #     uses: appleboy/ssh-action@v1
      #     with:
      #       host: ${{ secrets.DEPLOY_HOST }}
      #       username: ${{ secrets.DEPLOY_USER }}
      #       key: ${{ secrets.DEPLOY_KEY }}
      #       script: |
      #         cd /opt/hear-ui
      #         docker compose pull
      #         docker compose up -d --remove-orphans
      #
      # Kubernetes:
      #   - name: Set image
      #     run: |
      #       kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
      #       kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}

      - name: Placeholder — replace with actual deployment steps
        run: echo "Add your deployment commands here"
